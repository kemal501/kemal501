<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – BARCA LIVE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-avatar {
      width: 120px;
      height: 120px;
      background: #FFD700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 20px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .info-label {
      font-weight: bold;
      opacity: 0.8;
    }
    .edit-btn {
      background: transparent;
      border: 1px solid #FFD700;
      color: #FFD700;
      padding: 5px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
    }
    .edit-form {
      display: none;
      margin-top: 10px;
    }
    .edit-form input {
      width: 100%;
      margin: 5px 0;
    }
  </style>
</head>
<body>
<div class="navbar">
  <div class="logo">🔵🔴 BARCA LIVE</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="rooms.html">Rooms</a>
    <a href="games.html">Games</a>
    <a href="wallet.html">Wallet</a>
    <a href="agency.html">Agency</a>
    <a href="profile.html">Profile</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container" style="max-width: 600px;">
  <div class="card">
    <div class="profile-avatar" id="avatar">🔵</div>
    <h2 style="text-align: center;" id="displayName">Loading...</h2>
    <p style="text-align: center; opacity: 0.7;" id="displayRole">User</p>

    <div class="info-row">
      <span class="info-label">Username</span>
      <span id="usernameValue">-</span>
      <button class="edit-btn" onclick="toggleEdit('username')">Edit</button>
    </div>
    <div id="editUsernameForm" class="edit-form">
      <input type="text" id="newUsername" placeholder="New username">
      <button class="btn" onclick="updateUsername()">Save</button>
    </div>

    <div class="info-row">
      <span class="info-label">Email</span>
      <span id="emailValue">-</span>
    </div>

    <div class="info-row">
      <span class="info-label">Phone</span>
      <span id="phoneValue">-</span>
    </div>

    <div class="info-row">
      <span class="info-label">Gender</span>
      <span id="genderValue">-</span>
      <button class="edit-btn" onclick="toggleEdit('gender')">Edit</button>
    </div>
    <div id="editGenderForm" class="edit-form">
      <select id="newGender">
        <option>prefer_not_to_say</option>
        <option>male</option>
        <option>female</option>
      </select>
      <button class="btn" onclick="updateGender()">Save</button>
    </div>

    <div class="info-row">
      <span class="info-label">KYC Status</span>
      <span id="kycStatusValue">-</span>
      <a href="kyc.html" class="edit-btn">Verify</a>
    </div>

    <div class="info-row">
      <span class="info-label">Referral Code</span>
      <span id="referralCodeValue">-</span>
      <button class="edit-btn" onclick="copyReferral()">Copy</button>
    </div>

    <div class="info-row">
      <span class="info-label">Member Since</span>
      <span id="joinedValue">-</span>
    </div>

    <div style="margin-top: 20px;">
      <button class="btn" onclick="showChangePassword()">Change Password</button>
    </div>
    <div id="changePasswordForm" style="display: none; margin-top: 15px;">
      <input type="password" id="oldPassword" placeholder="Current password">
      <input type="password" id="newPassword" placeholder="New password">
      <input type="password" id="confirmPassword" placeholder="Confirm new password">
      <button class="btn" onclick="changePassword()">Update Password</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://barca-live-api.up.railway.app'; // CHANGE TO YOUR RAILWAY URL
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = 'login.html';

  let currentUserData = {};

  async function loadProfile() {
    try {
      const res = await fetch(`${API_URL}/api/users/${user.id || user.uid}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.success) {
        currentUserData = data.user;
        document.getElementById('displayName').innerText = currentUserData.username;
        document.getElementById('displayRole').innerText = currentUserData.role === 'agent' ? 'Agent' : 'User';
        document.getElementById('usernameValue').innerText = currentUserData.username;
        document.getElementById('emailValue').innerText = currentUserData.email || 'Not set';
        document.getElementById('phoneValue').innerText = currentUserData.phone || 'Not set';
        document.getElementById('genderValue').innerText = currentUserData.gender || 'prefer_not_to_say';
        document.getElementById('kycStatusValue').innerHTML = currentUserData.kycStatus === 'approved' ? '✅ Verified' : '⏳ Pending';
        document.getElementById('referralCodeValue').innerText = currentUserData.referralCode;
        document.getElementById('joinedValue').innerText = new Date(currentUserData.createdAt).toLocaleDateString();
        document.getElementById('avatar').innerText = currentUserData.gender === 'male' ? '👨' : (currentUserData.gender === 'female' ? '👩' : '🔵');
      }
    } catch (err) {
      console.error(err);
    }
  }

  function toggleEdit(field) {
    if (field === 'username') {
      const form = document.getElementById('editUsernameForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    } else if (field === 'gender') {
      const form = document.getElementById('editGenderForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
  }

  async function updateUsername() {
    const newUsername = document.getElementById('newUsername').value;
    if (!newUsername) return alert('Enter a username');
    try {
      const res = await fetch(`${API_URL}/api/users/${user.id || user.uid}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ username: newUsername })
      });
      const data = await res.json();
      if (data.success) {
        alert('Username updated');
        loadProfile();
        document.getElementById('editUsernameForm').style.display = 'none';
        // Update stored user
        let stored = JSON.parse(localStorage.getItem('user'));
        stored.username = newUsername;
        localStorage.setItem('user', JSON.stringify(stored));
      } else {
        alert(data.error);
      }
    } catch (err) { alert('Error updating username'); }
  }

  async function updateGender() {
    const newGender = document.getElementById('newGender').value;
    try {
      const res = await fetch(`${API_URL}/api/users/${user.id || user.uid}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ gender: newGender })
      });
      const data = await res.json();
      if (data.success) {
        alert('Gender updated');
        loadProfile();
        document.getElementById('editGenderForm').style.display = 'none';
      } else alert(data.error);
    } catch (err) { alert('Error updating gender'); }
  }

  function copyReferral() {
    const code = document.getElementById('referralCodeValue').innerText;
    navigator.clipboard.writeText(code);
    alert('Referral code copied!');
  }

  function showChangePassword() {
    const form = document.getElementById('changePasswordForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function changePassword() {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    if (newPwd !== confirmPwd) return alert('New passwords do not match');
    if (newPwd.length < 6) return alert('Password must be at least 6 characters');
    try {
      // Note: backend does not have a dedicated password change endpoint yet.
      // You can extend your server.js with PUT /api/users/:userId/password
      alert('Password change endpoint not implemented in backend yet. Please contact admin.');
    } catch (err) { alert('Error'); }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }

  loadProfile();
</script>
</body>
</html>
