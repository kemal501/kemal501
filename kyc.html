<!DOCTYPE html>
<html><head><title>KYC</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="navbar"><div class="logo">✅ KYC Verification</div><div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="#" onclick="logout()">Logout</a></div></div>
<div class="container"><div class="card"><h3>Identity Verification</h3><p>Required to withdraw funds.</p><input id="phone" placeholder="Phone number"><button class="btn" onclick="sendOTP()">Send OTP</button><input id="otp" placeholder="Enter OTP" style="margin-top:15px"><button class="btn" onclick="verifyOTP()">Verify</button><div id="msg"></div></div></div>
<script>const API_URL='https://barca-live-api.up.railway.app';const token=localStorage.getItem('token');const user=JSON.parse(localStorage.getItem('user')||'{}');if(!token)location.href='login.html';
async function sendOTP(){const phone=document.getElementById('phone').value;const res=await fetch(`${API_URL}/api/kyc/submit`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({userId:user.id||user.uid,phoneNumber:phone})});const data=await res.json();alert(data.message);}
async function verifyOTP(){const otp=document.getElementById('otp').value;const res=await fetch(`${API_URL}/api/kyc/verify-phone`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({userId:user.id||user.uid,otp})});const data=await res.json();document.getElementById('msg').innerText=data.message;if(data.success)setTimeout(()=>window.location.href='dashboard.html',2000);}
function logout(){localStorage.clear();window.location.href='index.html';}</script>
</body></html>
