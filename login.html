<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="navbar"><div class="logo">🔵🔴 BARCA LIVE</div><div class="nav-links"><a href="index.html">Home</a><a href="register.html">Register</a></div></div>
<div class="container" style="max-width: 450px;">
  <div class="card"><h2>Login</h2><div id="error" class="error"></div>
    <input type="text" id="identifier" placeholder="Email / Phone / Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()" style="width:100%">Login</button>
    <p style="margin-top:15px">No account? <a href="register.html">Register</a></p>
  </div>
</div>
<script>const API_URL='https://barca-live-api.up.railway.app';async function login(){const id=document.getElementById('identifier').value,pwd=document.getElementById('password').value;try{const res=await fetch(`${API_URL}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifier:id,password:pwd})});const data=await res.json();if(data.success){localStorage.setItem('token',data.token);localStorage.setItem('user',JSON.stringify(data.user));window.location.href='dashboard.html';}else document.getElementById('error').innerText=data.error;}catch(e){document.getElementById('error').innerText='Connection error';}}</script>
</body>
</html>
