<!DOCTYPE html>
<html><head><title>Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="navbar"><div class="logo">🔵🔴 BARCA LIVE</div><div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="rooms.html">Rooms</a><a href="games.html">Games</a><a href="wallet.html">Wallet</a><a href="agency.html">Agency</a><a href="#" onclick="logout()">Logout</a></div></div>
<div class="container" id="main"></div>
<script>const API_URL='https://barca-live-api.up.railway.app';const token=localStorage.getItem('token');if(!token)location.href='login.html';const user=JSON.parse(localStorage.getItem('user')||'{}');async function apiCall(endpoint){const res=await fetch(`${API_URL}${endpoint}`,{headers:{'Authorization':`Bearer ${token}`}});return res.json();}
function showDashboard(){document.getElementById('main').innerHTML=`<div class="card"><h2>Welcome ${user.username||'User'}!</h2><p>Earn up to 20,000 coins/hour in voice rooms.</p></div><div class="stats"><div class="stat"><div class="stat-value" id="balance">0</div><div>Coins</div></div><div class="stat"><div class="stat-value" id="total">0</div><div>Total Earned</div></div><div class="stat"><div class="stat-value" id="kyc">Pending</div><div>KYC</div></div></div><div><a href="rooms.html" class="btn">🎤 Voice Rooms</a> <a href="games.html" class="btn">🎮 Games</a> <a href="wallet.html" class="btn">💰 Wallet</a> <a href="agency.html" class="btn">👥 Agency</a> <a href="withdraw.html" class="btn">💸 Withdraw</a> <a href="kyc.html" class="btn">✅ KYC</a></div><div class="card"><h3>🔥 Daily Bonus</h3><div id="bonusText">-- min / 60 min</div><div class="progress-bar"><div class="progress-fill" id="bonusFill"></div></div></div>`;loadData();}
async function loadData(){try{const bal=await apiCall(`/api/coins/balance/${user.id||user.uid}`);document.getElementById('balance').innerText=bal.balance;const prof=await apiCall(`/api/users/${user.id||user.uid}`);document.getElementById('total').innerText=prof.user.totalEarnings||0;document.getElementById('kyc').innerHTML=prof.user.kycStatus==='approved'?'✅ Verified':'⏳ Pending';const bonus=await apiCall(`/api/bonus/daily/${user.id||user.uid}`);const mins=bonus.minutesInRoom||0;const percent=Math.min((mins/60)*100,100);document.getElementById('bonusText').innerText=`${mins} min / 60 min`;document.getElementById('bonusFill').style.width=`${percent}%`;}catch(e){}}
function logout(){localStorage.clear();window.location.href='index.html';}
showDashboard();</script>
</body></html>
